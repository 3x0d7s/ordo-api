spring:
  application:
    name: ordo-testcontainers
    
  datasource:
    # These properties will be dynamically set by Testcontainers
    # url: will be set to the container's JDBC URL
    # username: will be set to the container's username  
    # password: will be set to the container's password
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: "SET timezone = 'UTC'"
    
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    database: postgresql
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        
  flyway:
    enabled: true # Enable Flyway for PostgreSQL tests to test real migration scenarios

    
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret
            redirect-uri: http://localhost:8080/test/callback
          github:
            clientId: test-github-client-id
            clientSecret: test-github-client-secret
            redirect-uri: http://localhost:8080/test/callback

app:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:5173
  oauth2:
    redirect-uri: http://localhost:5173/auth/callback

jwt:
  secret: dGVzdC1zZWNyZXQtZm9yLXRlc3RpbmctcHVycG9zZXMtb25seQ==  # base64 encoded "test-secret-for-testing-purposes-only"
  expiration-ms: 3600000  # 1 hour for tests

logging:
  level:
    com.kyut.ordo: DEBUG
    org.springframework.security: DEBUG
    org.springframework.transaction: DEBUG
    org.testcontainers: DEBUG
    org.flywaydb: DEBUG

# Set system timezone to UTC for tests
server:
  timezone: UTC
