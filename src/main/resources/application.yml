spring:
  application:
    name: ordo

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
#    hibernate:
#      ddl-auto: validate
    show-sql: true
    database: postgresql
    properties:
      hibernate:
        format_sql: true
    generate-ddl: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    default-schema: public
    table: flyway_schema_history
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${OAUTH2_GITHUB_CLIENT_ID}
            clientSecret: ${OAUTH2_GITHUB_CLIENT_SECRET}
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs

jwt:
  secret: ${JWT_SECRET}