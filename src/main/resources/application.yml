spring:
  application:
    name: ordo

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    database: postgresql
    properties:
      hibernate:
        format_sql: true
    generate-ddl: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    default-schema: public
    table: flyway_schema_history
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${OAUTH2_GITHUB_CLIENT_ID}
            clientSecret: ${OAUTH2_GITHUB_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_GITHUB_REDIRECT_URI}
            scope:
              - user:email
              - read:user
          google:
            client-id: ${OAUTH2_GOOGLE_CLIENT_ID}
            client-secret: ${OAUTH2_GOOGLE_CLIENT_SECRET}
            redirect-uri: ${OAUTH2_GOOGLE_REDIRECT_URI}
            scope:
              - email
              - profile
        provider:
          google:
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: email
          github:
            user-info-uri: https://api.github.com/user
            user-name-attribute: login
      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com

custom:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 10800000  # 3 години
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  cookie:
    same-site: ${COOKIE_SAMESITE}
    secure: ${COOKIE_SECURE}

springdoc:
  swagger-ui:
    path: /swagger-ui
  api-docs:
    path: /api-docs

ordo:
  dsl:
    enabled: true
    rules-path: classpath:rules/ordo-rules.dsl
    execution-logging:
      enabled: true