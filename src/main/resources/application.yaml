spring:
  application:
    name: ordo

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database: postgresql
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    default-schema: public
    table: flyway_schema_history
    locations: classpath:db/migration

  security:
    oauth2:
      client:
        registration:
          github:
            clientId: ${OATH2_GITHUB_CLIENT_ID}
            clientSecret: ${OATH2_GITHUB_CLIENT_SECRET}
          google:
            client-id: ${OATH2_GOOGLE_CLIENT_ID}
            client-secret: ${OATH2_GOOGLE_CLIENT_SECRET}